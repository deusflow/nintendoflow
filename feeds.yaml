# ============================================================
# REDDIT — JSON API
# Reddit blocks RSS from GitHub Actions (Azure) IP ranges at the WAF level.
# The JSON API uses a separate routing layer and is more reliable from
# datacenter IPs, especially with REDDIT_CLIENT_ID + REDDIT_CLIENT_SECRET
# (Application-Only OAuth2 — no user login needed).
# ============================================================

- url: "https://www.reddit.com/r/NintendoSwitch/new.json?limit=50&raw_json=1"
  name: "Reddit - NintendoSwitch"
  lang: en
  priority: 68
  active: false
  type: aggregator
  fetch_mode: reddit_json
  require_anchor: false
  needs_redirect_resolve: false

- url: "https://www.reddit.com/r/nintendo/new.json?limit=50&raw_json=1"
  name: "Reddit - Nintendo"
