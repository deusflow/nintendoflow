# Topic-based keyword scoring rules loaded at runtime.
# Edit and push to main - changes apply on next cron run.
#
# enabled: false  -> whole topic is ignored
# priority: 0-200 (default 100 when omitted) -- scales every keyword weight
#   effective_weight = keyword.weight * priority / 100
# role meanings:
#   anchor     = explicit Nintendo context marker
#   comparison = hardware/graphics/performance comparison marker
#   signal     = general news value marker
#   tech       = developer/hardware capability reveal marker
#   reject     = low-value content penalty

topics:

  brands:
    enabled: true
    priority: 100
    keywords:
      - word: "nintendo"
        role: anchor
        weight: 20

  platform:
