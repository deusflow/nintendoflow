# Keyword scoring rules loaded at runtime.
# Edit these entries and push to main: changes apply on next cron run.
# role meanings:
#   anchor     = explicit Nintendo context marker
#   comparison = hardware/graphics/performance comparison marker
#   signal     = general news value marker
#   reject     = low-value content penalty

- word: "nintendo"
  category: brand
  role: anchor
  weight: 20   # safest anchor; broad feeds should almost never pass without it

- word: "switch"
  category: platform
  role: anchor
  weight: 22   # catches Switch-family stories even when brand name is omitted

