name: Nintendo News Bot (Test Moderation)

on:
  schedule:
    - cron: '15 */4 * * *'
  workflow_dispatch:

jobs:
  run-bot-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'
          cache: true

      - name: Build
        run: go build -o bot ./cmd/bot

      - name: Run bot in test moderation mode
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TEST_TELEGRAM_TOKEN: ${{ secrets.TEST_TELEGRAM_TOKEN }}
          TEST_CHANNEL_ID: ${{ secrets.TEST_CHANNEL_ID }}
          TEST_ADMIN_CHAT_ID: ${{ secrets.TEST_ADMIN_CHAT_ID }}
          TEST_MODERATION_MODE: "true"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_MODELS_API_KEY: ${{ secrets.GH_MODELS_API_KEY }}
          AI_CONFIG_PATH: "ai_config.json"
        run: ./bot

