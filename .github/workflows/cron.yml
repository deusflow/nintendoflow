name: Nintendo News Bot

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 10 * * *'
    - cron: '0 14 * * *'
    - cron: '0 18 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'
          cache: true

      - name: Build
        run: go build -o bot ./cmd/bot

      - name: Run bot
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          # Секреты для режима модерации (берем реальные ключи)
          TEST_TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TEST_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TEST_ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          TEST_MODERATION_MODE: "true"
          # ИИ
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_MODELS_API_KEY: ${{ secrets.GH_MODELS_API_KEY }}
          AI_CONFIG_PATH: "ai_config.json"
        run: ./bot