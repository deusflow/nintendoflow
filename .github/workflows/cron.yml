name: Nintendo News Bot

on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'
          cache: true

      - name: Build
        run: go build -o bot ./cmd/bot

      - name: Run bot
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TEST_TELEGRAM_TOKEN: ${{ secrets.TEST_TELEGRAM_TOKEN }}
          TEST_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TEST_ADMIN_CHAT_ID: ${{ secrets.TEST_ADMIN_CHAT_ID }}
          TEST_MODERATION_MODE: "false"
          # ИИ
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_MODELS_API_KEY: ${{ secrets.GH_MODELS_API_KEY }}
          AI_CONFIG_PATH: "ai_config.json"
          # Anti-ban
          SCRAPER_PROXY_URL: ${{ secrets.SCRAPER_PROXY_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          # Threads Cross-posting
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          TELEGRAM_CHANNEL_USERNAME: "deusflow"
        run: ./bot