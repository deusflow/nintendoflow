name: Export Articles to GitHub Pages

on:
  schedule:
    # 6 times/day (UTC)
    - cron: '0 6,10,14,18,22,2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: export-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Export articles to JSON
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PGCONNECT_TIMEOUT: '15'
        run: |
          echo "Starting export..."
          go run ./cmd/export/main.go
          echo "Export completed"

      - name: Verify data.json
        run: |
          if [ -f docs/data.json ]; then
            echo "✓ data.json exists"
            wc -l docs/data.json
          else
            echo "✗ data.json not found"
            exit 1
          fi

      - name: Validate exported content
        run: |
          count=$(jq '.articles | length' docs/data.json)
          echo "exported_articles_count=${count}"
          if [ "${count}" -eq 0 ]; then
            echo "::warning::Export completed but contains 0 published articles. Check DB statuses (status='published')."
          else
            jq '.articles[0] | {id, title_ua, source_name, status}' docs/data.json
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

