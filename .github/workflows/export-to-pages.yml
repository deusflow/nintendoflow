name: Export Articles to GitHub Pages

on:
  schedule:
    # 6 times/day (UTC)
    - cron: '0 6,10,14,18,22,2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: export-pages
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Export articles to JSON
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PGCONNECT_TIMEOUT: '15'
        run: |
          echo "Starting export..."
          go run ./cmd/export/main.go
          echo "Export completed"

      - name: Verify data.json
        run: |
          if [ -f docs/data.json ]; then
            echo "✓ data.json exists"
            wc -l docs/data.json
          else
            echo "✗ data.json not found"
            exit 1
          fi

      - name: Commit and push data.json
        run: |
          git config --global user.name "DEUSFLOW Bot"
          git config --global user.email "bot@deusflow.local"
          git pull --rebase origin "${{ github.ref_name }}"
          git add docs/data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update articles export $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin HEAD:${{ github.ref_name }}
          fi

