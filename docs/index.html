<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DEUSFLOW - Neo-Nintendo News Network. Архів найцікавіших новин про Nintendo з AI-обробкою." />
    <meta name="theme-color" content="#080014" />
    <title>DEUSFLOW - Nintendo Українця</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Noto+Serif+JP:wght@900&display=swap');

        :root {
            --hyper-pink: #ff2e8f;
            --milky-blush: #ffd1e0;
            --deep-void: #080014;
            --glass: rgba(255, 210, 230, 0.04);
            --glass-border: rgba(255, 46, 143, 0.2);
        }

        *{margin:0;padding:0;box-sizing:border-box}
        body{background: radial-gradient(circle at 50% 30%, #1a0026, var(--deep-void)); color:#ede8e3; font-family:'Rajdhani',sans-serif; min-height:100vh; overflow-x:hidden; cursor:none}

        #cur{position:fixed; width:24px; height:24px; background:radial-gradient(circle, var(--hyper-pink), transparent 70%); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); box-shadow:0 0 30px var(--hyper-pink); mix-blend-mode:screen; transition:transform 0.1s ease-out}
        #cur-r{position:fixed; width:60px; height:60px; border:1px solid var(--milky-blush); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); opacity:0.3}

        #intro{position:fixed; inset:0; z-index:2000; background:var(--deep-void); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; transition: opacity 0.4s ease}
        .ik{font-family:'Noto Serif JP',serif; font-size:64px; font-weight:900; color:var(--hyper-pink); text-shadow:0 0 40px var(--hyper-pink); animation: liquid-intro 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards}
        .is{font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:10px; color:rgba(255,209,224,0.5)}
        @keyframes liquid-intro {
            0% { transform: scale(1.5) skewX(10deg); filter: blur(10px); opacity: 0; }
            100% { transform: scale(1) skewX(0deg); filter: blur(0px); opacity: 1; }
        }

        .scanlines { position:fixed; inset:0; background:linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.15) 50%); z-index:1000; background-size:100% 4px; pointer-events:none; opacity:0.4 }

        nav{position:sticky; top:0; z-index:100; height:60px; padding:0 40px; display:flex; align-items:center; justify-content:space-between; background:rgba(8,0,20,0.6); border-bottom:1px solid var(--glass-border); backdrop-filter:blur(24px)}
        .logo-txt{font-family:'Black Ops One',sans-serif; font-size:18px; letter-spacing:6px; color:#fff; text-shadow: 0 0 15px var(--hyper-pink)}
        .logo-txt span{color:var(--hyper-pink)}
        .nav-r{display:flex;align-items:center;gap:8px}
        .live-w{display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.6); font-family: 'Bebas Neue', sans-serif;}
        .lr{width:12px;height:12px;border:1px solid var(--hyper-pink);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:lring 2s infinite}
        @keyframes lring{0%,100%{box-shadow:0 0 0 0 rgba(255,46,143,0.5)}50%{box-shadow:0 0 0 6px rgba(255,46,143,0)}}
        .ld{width:4px;height:4px;background:var(--hyper-pink);border-radius:50%}

        .hero { position: relative; height: 55vh; min-height: 480px; max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: center; perspective: 1000px; overflow: hidden; opacity: 0; transition: opacity 1s ease; margin-bottom: 20px; }
        .hero.active { opacity: 1; }

        .p-layer { position: absolute; transition: transform 0.1s linear; will-change: transform; }

        #p-bg {
            z-index: 1;
            opacity: 0.4;
            left: 0%;
            top: 50%;
            margin-top: -200px;
            filter: drop-shadow(0 0 40px rgba(255,46,143,0.4));
            pointer-events: none;
            width: 400px;
        }

        #p-title {
            z-index: 2;
            left: 5%;
            top: 40%;
            font-family: 'Black Ops One', sans-serif;
            font-size: clamp(50px, 8vw, 120px);
            color: rgba(255,255,255,0.95);
            text-shadow: 0 0 40px rgba(255,46,143,0.4);
            pointer-events: none;
            white-space: nowrap;
        }
        #p-title b { color: var(--hyper-pink); text-shadow: 0 0 50px var(--hyper-pink); }
        #p-subtitle { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 6px; color: var(--milky-blush); display: block; margin-top: 10px; }

        #p-front {
            z-index: 3;
            right: 5%;
            top: 50%;
            margin-top: -150px;
        }

        .glass-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,46,143,0.1);
            padding: 30px;
            width: 460px;
        }

        .hn-badge { display:inline-flex; align-items:center; background:rgba(255,46,143,0.15); border: 1px solid var(--hyper-pink); color:var(--milky-blush); padding:4px 12px; font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:2px; margin-bottom:12px; border-radius: 12px;}
        .hn-title { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:28px; line-height:1.1; color:#fff; margin-bottom:10px; text-transform:uppercase; text-shadow: 0 0 10px rgba(255,255,255,0.2)}
        .hn-desc { font-size:15px; color:rgba(255,209,224,0.7); line-height:1.5; margin-bottom:20px}
        .btn-read { background:var(--hyper-pink); color:#fff; border:none; padding:12px 24px; font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:2px; cursor:pointer; font-weight:700; border-radius: 8px; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);}
        .btn-read:hover { background:#fff; color:var(--hyper-pink); transform: translateY(-4px); box-shadow: 0 10px 30px rgba(255,46,143,0.4)}

        .row-section { max-width:1400px; margin: 10px auto 80px; position: relative; z-index: 10; }
        .row-header { display:flex; align-items:center; gap:20px; padding:0 40px; margin-bottom:20px; }
        .row-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:6px; color:var(--milky-blush); }
        .row-line { flex:1; height:1px; background:linear-gradient(90deg, var(--hyper-pink), transparent); opacity: 0.5; }

        .carousel { display:flex; gap:30px; padding:10px 40px 60px; overflow-x:auto; scrollbar-width:none; }
        .carousel::-webkit-scrollbar { display:none; }

        .c-card {
            min-width:340px; width:340px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px) saturate(180%);
            border-radius: 24px;
            overflow:hidden;
            transition: all 0.4s cubic-bezier(0.34, 1.5, 0.64, 1);
            position:relative; flex-shrink:0; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-decoration: none;
            display: block;
            color: inherit;
        }
        .c-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--hyper-pink);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 25px rgba(255,46,143,0.2);
        }

        .c-thumb { height:180px; position:relative; overflow: hidden; }
        .c-thumb::after { content:''; position:absolute; inset:0; background:linear-gradient(to top, rgba(8,0,20,0.9), transparent); z-index:1; }
        .c-thumb img { width:100%; height:100%; object-fit:cover; opacity:0.7; transition: 0.5s ease; filter: grayscale(20%); loading: lazy; }
        .c-card:hover .c-thumb img { opacity:1; transform:scale(1.1); filter: grayscale(0%); }

        .c-tag { position:absolute; top:15px; right:15px; background:rgba(255,46,143,0.2); border: 1px solid var(--hyper-pink); color:var(--milky-blush); padding:4px 10px; font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing: 2px; border-radius:10px; z-index:3; backdrop-filter: blur(4px); }

        .c-body { padding:20px; position: relative; z-index: 2; }
        .c-title { font-size:16px; font-weight:700; color:#fff; text-transform:uppercase; margin-bottom:15px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .c-foot { display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px; }
        .c-src { color:var(--hyper-pink); font-weight:700; font-family: 'Bebas Neue', sans-serif; letter-spacing:2px; font-size:14px; }
        .c-score { color: rgba(255,255,255,0.4); font-size: 12px; }

        .loading { display: flex; justify-content: center; align-items: center; height: 300px; font-size: 14px; color: rgba(255,255,255,0.5); }
        .error { color: #ff6b9d; padding: 20px; text-align: center; }

        @media (max-width: 1200px) {
            .glass-card { width: 380px; padding: 20px; }
            #p-title { font-size: clamp(40px, 6vw, 90px); }
        }
        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            .glass-card { display: none; }
            #p-title { left: 10%; font-size: clamp(30px, 5vw, 70px); }
            #p-bg { width: 280px; }
            .row-header { padding: 0 20px; }
            .carousel { padding: 10px 20px 40px; gap: 15px; }
            .c-card { min-width: 280px; width: 280px; }
        }
    </style>
</head>
<body>
<div id="intro"><div class="ik">DEUSFLOW</div><div class="is">SYSTEM INITIALIZATION</div></div>
<div class="scanlines"></div>
<div id="cur"></div><div id="cur-r"></div>

<nav>
    <div class="nav-logo">
        <div class="logo-txt">DEUS<span>⚡</span>FLOW</div>
    </div>
    <div class="nav-r">
        <div class="live-w"><div class="lr"><div class="ld"></div></div><span id="db-status">DATABASE: ONLINE</span></div>
    </div>
</nav>

<div class="hero" id="hero">
    <div class="p-layer" id="p-bg">
        <svg viewBox="0 0 240 280" fill="none" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <!-- Speed lines -->
            <g opacity="0.3">
                <line x1="120" y1="140" x2="0" y2="0" stroke="var(--hyper-pink)" stroke-width=".8"/>
                <line x1="120" y1="140" x2="240" y2="0" stroke="var(--hyper-pink)" stroke-width=".8"/>
                <line x1="120" y1="140" x2="0" y2="280" stroke="var(--hyper-pink)" stroke-width=".8"/>
                <line x1="120" y1="140" x2="240" y2="280" stroke="var(--hyper-pink)" stroke-width=".8"/>
                <line x1="120" y1="140" x2="60" y2="0" stroke="var(--hyper-pink)" stroke-width=".5"/>
                <line x1="120" y1="140" x2="180" y2="0" stroke="var(--hyper-pink)" stroke-width=".5"/>
            </g>
            <!-- Console Body -->
            <rect x="45" y="70" width="150" height="100" rx="16" fill="#150a1f" stroke="var(--hyper-pink)" stroke-width="1.5"/>
            <rect x="77" y="82" width="86" height="76" rx="6" fill="#080014"/>
            <rect x="82" y="88" width="76" height="4" rx="2" fill="var(--hyper-pink)"/>
            <rect x="82" y="96" width="60" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>
            <rect x="82" y="101" width="48" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
            <rect x="82" y="110" width="76" height="30" rx="4" fill="rgba(255,46,143,0.05)" stroke="var(--milky-blush)" stroke-width=".5"/>
            <rect x="86" y="114" width="28" height="22" rx="2" fill="rgba(255,46,143,0.3)"/>
            <rect x="118" y="116" width="36" height="2.5" rx="1" fill="rgba(255,255,255,0.3)"/>
            <rect x="118" y="122" width="28" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
            <rect x="86" y="140" width="30" height="7" rx="2" fill="var(--hyper-pink)"/>

            <!-- Left Joy-con -->
            <rect x="22" y="78" width="25" height="84" rx="12" fill="#120515" stroke="var(--hyper-pink)" stroke-width="1"/>
            <circle cx="31" cy="96" r="7" fill="#080014" stroke="rgba(255,46,143,0.5)"/>
            <circle cx="31" cy="96" r="2.5" fill="var(--milky-blush)"/>
            <circle cx="35" cy="120" r="3.5" fill="#080014" stroke="var(--milky-blush)" stroke-width=".5"/>
            <circle cx="31" cy="127" r="3.5" fill="#080014" stroke="var(--milky-blush)" stroke-width=".5"/>
            <circle cx="27" cy="120" r="3.5" fill="#080014" stroke="var(--milky-blush)" stroke-width=".5"/>

            <!-- Right Joy-con -->
            <rect x="193" y="78" width="25" height="84" rx="12" fill="#1a0515" stroke="var(--hyper-pink)" stroke-width="1.5"/>
            <circle cx="207" cy="96" r="7" fill="#080014" stroke="rgba(255,46,143,0.5)"/>
            <circle cx="207" cy="96" r="2.5" fill="var(--hyper-pink)"/>
            <circle cx="211" cy="116" r="4" fill="var(--hyper-pink)"/>
            <circle cx="207" cy="123" r="3.5" fill="rgba(255,46,143,0.2)" stroke="var(--hyper-pink)" stroke-width=".5"/>
            <circle cx="203" cy="116" r="3.5" fill="rgba(255,46,143,0.2)" stroke="var(--hyper-pink)" stroke-width=".5"/>
            <circle cx="207" cy="109" r="3.5" fill="rgba(255,46,143,0.2)" stroke="var(--hyper-pink)" stroke-width=".5"/>

            <!-- Cursed / Cyber Lines -->
            <path d="M45 100 Q20 80 10 58" stroke="var(--milky-blush)" stroke-width="1.5" fill="none" stroke-dasharray="2,4"/>
            <path d="M195 90 Q218 70 226 48" stroke="var(--hyper-pink)" stroke-width="1.5" fill="none" stroke-dasharray="2,4"/>

            <!-- Kanji -->
            <text x="16" y="54" font-family="Noto Serif JP,serif" font-size="10" font-weight="900" fill="var(--milky-blush)">呪</text>
            <text x="210" y="44" font-family="Noto Serif JP,serif" font-size="10" font-weight="900" fill="var(--hyper-pink)">術</text>

            <!-- Pulse Frame -->
            <rect x="18" y="65" width="204" height="112" rx="18" stroke="var(--hyper-pink)" stroke-width="1" fill="none">
                <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
                <animate attributeName="stroke-width" values="1;3;1" dur="2s" repeatCount="indefinite"/>
            </rect>
        </svg>
    </div>

    <div class="p-layer" id="p-title">
        DEUS<b>⚡</b>FLOW
        <span id="p-subtitle">Nintendo Українця</span>
    </div>
    <!-- Передний слой: Glass Card (Новость) -->
    <div class="p-layer glass-card" id="p-front">
        <div class="hn-badge" id="hero-badge">NEW FROM BOT</div>
        <div class="hn-title" id="hero-title">ELDEN RING: SWITCH 2 PERFORMANCE LEAK</div>
        <div class="hn-desc" id="hero-desc">FromSoftware адаптировали движок. Стабильные 30 FPS при нативном 1080p в портативе. Это начало новой эры.</div>
        <button class="btn-read" id="hero-btn" style="cursor: pointer;">READ ARTICLE</button>
    </div>
</div>

<div class="row-section">
    <div class="row-header">
        <div class="row-title">HOT DATABASE</div>
        <div class="row-line"></div>
    </div>
    <div class="carousel" id="carousel">
        <div class="loading">Loading articles...</div>
    </div>
</div>

<script>
    // ===== Cursor 2026 =====
    const cur = document.getElementById('cur');
    const cr = document.getElementById('cur-r');
    if (cur && cr) {
        document.addEventListener('mousemove', e => {
            cur.style.left = e.clientX + 'px';
            cur.style.top = e.clientY + 'px';
            cr.style.left = e.clientX + 'px';
            cr.style.top = e.clientY + 'px';
        });
    }

    // ===== Intro =====
    setTimeout(() => {
        const intro = document.getElementById('intro');
        if (intro) {
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                const hero = document.getElementById('hero');
                if (hero) hero.classList.add('active');
            }, 400);
        }
    }, 1200);

    // ===== Parallax =====
    const bg = document.getElementById('p-bg');
    const title = document.getElementById('p-title');
    const front = document.getElementById('p-front');
    document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 2;
        const y = (e.clientY / window.innerHeight - 0.5) * 2;
        if(bg) bg.style.transform = `translate(${x * 20}px, ${y * 20}px) scale(1.15)`;
        if(title) title.style.transform = `translate(${x * -10}px, ${y * -10}px)`;
        if(front) front.style.transform = `translate(${x * -30}px, ${y * -30}px) rotateX(${y * 5}deg) rotateY(${x * -5}deg)`;
    });

    // ===== Carousel wheel scroll =====
    document.querySelectorAll('.carousel').forEach(c => {
        c.addEventListener('wheel', e => {
            if (e.deltaY !== 0) {
                e.preventDefault();
                c.scrollLeft += e.deltaY * 3;
            }
        });
    });

    // ===== Data Loader =====
    async function fetchArchiveData() {
        const stamp = Date.now();
        const candidates = [
            `./data.json?v=${stamp}`,
            `data.json?v=${stamp}`,
            `/nintendoflow/data.json?v=${stamp}`,
            `/data.json?v=${stamp}`
        ];

        let lastError = null;
        for (const url of candidates) {
            try {
                const response = await fetch(url, {
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} for ${url}`);
                }
                const json = await response.json();
                return { data: json, source: url };
            } catch (err) {
                lastError = err;
            }
        }
        throw lastError || new Error('Failed to load archive data from all candidates');
    }

    async function loadData() {
        try {
            const { data, source } = await fetchArchiveData();
            const articles = Array.isArray(data.articles) ? data.articles : [];
            document.getElementById('db-status').textContent = articles.length + ' ARTICLES';
            console.info('archive data loaded', {
                source,
                exported_at: data.exported_at || null,
                count: articles.length
            });

            if (articles.length === 0) {
                showEmptyState(data.exported_at || null);
                return;
            }

            renderHero(articles[0]);
            renderCarousel(articles.slice(1, 10));
        } catch (err) {
            console.error('Data load error:', err);
            document.getElementById('db-status').textContent = 'OFFLINE';
            document.getElementById('carousel').innerHTML = `<div class="error">Failed to load articles. Check if data.json exists.</div>`;
        }
    }

    function renderHero(article) {
        if (!article) return;
        document.getElementById('hero-title').textContent = stripHtml(article.title_ua || article.title_raw || '');
        const cleanDesc = stripHtml(article.body_ua || article.description || '');
        document.getElementById('hero-desc').textContent = cleanDesc.substring(0, 120) + '...';
        document.getElementById('hero-btn').onclick = () => {
            window.location.href = `./article.html?id=${article.id}`;
        };
    }

    function renderCarousel(articles) {
        const carousel = document.getElementById('carousel');
        if (!articles || articles.length === 0) {
            carousel.innerHTML = '<div class="error">No articles available yet.</div>';
            return;
        }
        carousel.innerHTML = articles.map(a => `
            <a href="./article.html?id=${a.id}" class="c-card">
                <div class="c-thumb">
                    <img src="${escapeHtml(resolveImageURL(a))}" alt="${escapeHtml(stripHtml(a.title_ua || a.title_raw || ''))}" loading="lazy"/>
                    <div class="c-tag">${escapeHtml(a.source_name || 'NEWS')}</div>
                </div>
                <div class="c-body">
                    <div class="c-title">${escapeHtml(stripHtml(a.title_ua || a.title_raw || ''))}</div>
                    <div class="c-foot">
                        <span class="c-src">${escapeHtml(a.source_name || 'SRC')}</span>
                        <span class="c-cmt">💬 ${a.score || 0}</span>
                    </div>
                </div>
            </a>
        `).join('');
    }

    function resolveImageURL(article) {
        if (article && article.image_url) {
            return article.image_url;
        }
        const t = String((article && article.article_type) || 'news').toLowerCase().trim();
        switch (t) {
            case 'insight':
                return './assets/placeholders/news-fallback-16x9.webp';
            case 'rumor':
                return './assets/placeholders/card-fallback-16x9.webp';
            case 'offtop':
                return './assets/placeholders/offtop-fallback-16x9.webp';
            case 'news':
            default:
                return './assets/placeholders/newstwo-fallback-16x9.webp';
        }
    }

    function stripHtml(input) {
        const txt = String(input || '');
        const div = document.createElement('div');
        div.innerHTML = txt;
        return (div.textContent || '').trim();
    }

    function escapeHtml(input) {
        const txt = String(input || '');
        const div = document.createElement('div');
        div.textContent = txt;
        return div.innerHTML;
    }

    function showEmptyState(exportedAt) {
        document.getElementById('hero-title').textContent = 'NO PUBLISHED ARTICLES YET';
        if (exportedAt) {
            document.getElementById('hero-desc').textContent = `Експорт виконано: ${exportedAt}, але масив articles порожній.`;
        } else {
            document.getElementById('hero-desc').textContent = 'База читається, але в таблиці articles немає рядків зі статусом published.';
        }
        document.getElementById('hero-btn').onclick = () => {
            window.location.href = '#';
        };
        document.getElementById('carousel').innerHTML = '<div class="error">No published articles. Publish at least one row in DB.</div>';
    }

    // Load on ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadData);
    } else {
        loadData();
    }
</script>
</body>
</html>
